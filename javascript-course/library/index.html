<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>My Library</h1>

    <button id="newBookBtn">+ Add New Book</button>

    <!-- dialog form for adding book -->
    <dialog id="bookDialog">
        <h2>Add a Book</h2>
        <form id="bookForm">
            <div>
                <label for="title">Title:</label>
                <input type="text" id="title" required>
            </div>
            <div>
                <label for="author">Author:</label>
                <input type="text" id="author" required>
            </div>
            <div>
                <label for="pages">Number of Pages:</label>
                <input type="number" id="pages" required min="1">
            </div>
            <div>
                <label for="readStatus">Have you read it?</label>
                <input type="checkbox" id="readStatus">
            </div>
            <div class="form-buttons">
                <button type="submit">Add Book</button>
                <button type="button" id="cancelBtn">Cancel</button>
            </div>
        </form>
    </dialog>

    <!-- books will show up here -->
    <div id="libraryDisplay">
        <p id="emptyMsg">No books yet. Add some!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
