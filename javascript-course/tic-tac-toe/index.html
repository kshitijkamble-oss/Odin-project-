<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Setup Screen ───────────────────────────────────────── -->
  <div id="setup-screen" class="screen">
    <div class="setup-layout">

      <div class="setup-title-area">
        <h1 class="game-title">
          <span class="title-word">Tic</span>
          <span class="title-word title-accent">Tac</span>
          <span class="title-word title-indent">Toe</span>
        </h1>
        <p class="game-tagline">Two players. Nine squares. One winner.</p>
      </div>

      <div class="setup-form-area">
        <div class="player-field">
          <div class="field-mark" aria-hidden="true">
            <svg viewBox="0 0 40 40" class="field-icon">
              <line x1="10" y1="10" x2="30" y2="30" stroke="#E63946" stroke-width="3.5" stroke-linecap="round"/>
              <line x1="30" y1="10" x2="10" y2="30" stroke="#E63946" stroke-width="3.5" stroke-linecap="round"/>
            </svg>
          </div>
          <input type="text" id="player1-name" placeholder="Player One" maxlength="12" autocomplete="off">
        </div>

        <div class="vs-row">
          <span class="vs-text">vs</span>
        </div>

        <div class="player-field">
          <div class="field-mark" aria-hidden="true">
            <svg viewBox="0 0 40 40" class="field-icon">
              <circle cx="20" cy="20" r="11" fill="none" stroke="#2563EB" stroke-width="3.5"/>
            </svg>
          </div>
          <input type="text" id="player2-name" placeholder="Player Two" maxlength="12" autocomplete="off">
        </div>

        <button id="start-btn" class="btn-primary">Begin</button>
      </div>

    </div>
  </div>

  <!-- ── Game Screen ────────────────────────────────────────── -->
  <div id="game-screen" class="screen hidden">

    <header class="game-header">
      <button id="menu-btn" class="btn-ghost">&#8592; Menu</button>
      <div class="turn-indicator" id="turn-indicator" aria-live="polite">
        <span class="turn-label">Current turn</span>
        <span class="turn-name" id="turn-name">—</span>
      </div>
    </header>

    <main class="board-container">
      <div id="board" class="board" role="grid" aria-label="Tic Tac Toe board"></div>
    </main>

    <footer class="game-footer">
      <div class="scoreboard">
        <div class="score-item score-x">
          <span class="score-label" id="score-label-x">—</span>
          <span class="score-value" id="score-val-x">0</span>
        </div>
        <div class="score-sep"></div>
        <div class="score-item score-o">
          <span class="score-label" id="score-label-o">—</span>
          <span class="score-value" id="score-val-o">0</span>
        </div>
      </div>
    </footer>

  </div>

  <!-- ── Result Overlay ─────────────────────────────────────── -->
  <div id="result-overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="result-message">
    <div class="result-card">
      <div class="result-icon" id="result-icon" aria-hidden="true"></div>
      <p class="result-message" id="result-message">—</p>
      <div class="result-actions">
        <button id="play-again-btn" class="btn-primary">Play Again</button>
        <button id="new-game-btn" class="btn-ghost">New Game</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
